<!doctype html>
<html lang="en">
<head>

  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="animations.jsx"></script>
  <script type="text/babel" src="scenes/section1-psa.jsx"></script>
  <script type="text/babel" src="scenes/section2-3.jsx"></script>
  <script type="text/babel" src="scenes/section4-5.jsx"></script>
  <script type="text/babel" src="scenes/section6-7.jsx"></script>
  <script type="text/babel" src="scenes/effects.jsx"></script>

  <script type="text/babel">
    function App() {
      return (
        <Stage width={960} height={720} duration={363} background="#000" loop={false} autoplay={false} persistKey="openfeed">
          <Broadcast />
        </Stage>
      );
    }

    function Broadcast() {
      return (
        <>
          <StationIdent />
          <Section1 />
          <Section2 />
          <Section3 />
          <Section4 />
          <Section5 />
          <Section6 />
          <Section7 />
          <Section8 />
          <CRTOverlay />
          <AudioEngine />
        </>
      );
    }

    function FrameMeta() {
      return null;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
